<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras | Desafios de Lógica com JavaScript</title>
    <link rel="shortcut icon" href="https://i.ibb.co/MkZtFhXX/logo-carrinho-compras.png" type="image/x-icon">
    <link rel="stylesheet" href="../projeto-base/css/estilo.css">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <main class="conteudo modelo__horizontal modelo__centralizado">
        <section class="conteudo__secao modelo__vertical modelo__centralizado">
            <h1 class="conteudo__titulo">Carrinho de Compras</h1>

            <div class="modelo__vertical modelo__centralizado">
                <input type="number" id="quantidade" name="quantidade" placeholder="Digite a quantidade" class="conteudo__caixa-texto"/>

                <select id="produtos" name="produtos" class="conteudo__caixa-texto"></select>
            </div>

            <div class="modelo__horizontal modelo__centralizado modelo__quebra">
                <button onclick="adicionar()" id="botao-adicionar" class="conteudo__botao fundo-adicionar">
                    Adicionar
                </button>
            </div>

            <div class="modelo__vertical modelo__centralizado" id="elemento-mensagem-aviso"></div>
        </section>

        <section class="conteudo__secao modelo__vertical modelo__centralizado">
            <h2 class="conteudo__subtitulo">
                Total: R$ 
                <span class="conteudo__destaque" id="elemento-preco">0</span>
            </h2>

            <div class="produtos modelo__horizontal modelo__centralizado modelo__quebra" id="elemento-produtos"></div>

            <div class="modelo__horizontal modelo__centralizado modelo__quebra">
                <table class="produto__tabela">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Produto</th>
                            <th>Quantidade</th>
                            <th>Preço</th>
                        </tr>
                    </thead>
                    <tbody id="elemento-produto-adicionado"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/script.js" defer></script>
</body>
</html>
